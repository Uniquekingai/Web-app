<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Coin Bot UI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Optional: Link to an icon font library like Font Awesome if you prefer -->
    <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> -->
</head>
<body>

    <div class="app-container">

        <header class="header">
            <span class="app-title">Gold Coin</span>
            <span class="balance">1050 G</span>
        </header>

        <section class="card spin-section">
            <div class="spin-content">
                <!-- Replace with actual icon image path -->
                <img src="images/spin_wheel_icon.png" alt="Spin Wheel Icon" class="spin-icon">
                <div class="spin-text">
                    <div class="spin-title">SPIN NOW!</div>
                    <div class="spin-chances">3 chances</div>
                </div>
            </div>
        </section>

        <section class="game-zone-section">
            <h2 class="section-title">Game Zone</h2>
            <div class="card game-list">
                <div class="game-item">
                    <!-- Replace with actual icon image path -->
                    <img src="images/backgammon_icon.png" alt="Backgammon Icon" class="game-icon">
                    <span class="game-name">Backgammon</span>
                </div>
                <div class="game-item">
                     <!-- Replace with actual icon image path -->
                    <img src="images/chess_icon.png" alt="Chess Icon" class="game-icon">
                    <span class="game-name">Chess</span>
                </div>
                <div class="game-item">
                     <!-- Replace with actual icon image path -->
                    <img src="images/snakes_ladders_icon.png" alt="Snakes & Ladders Icon" class="game-icon">
                    <span class="game-name">Snakes & Ladders</span>
                </div>
            </div>
        </section>

        <section class="tasks-section">
             <h2 class="section-title">Tasks</h2>
             <div class="card task-item">
                 <!-- Replace with actual icon image path or use a font icon -->
                 <span class="task-icon">✔️</span>
                 <span class="task-text">Complete and earn</span>
             </div>
        </section>

        <button class="withdraw-button">Withdraw Tokens</button>

    </div>

    <!-- Optional: Link to a JavaScript file for interactivity -->
    <!-- <script src="script.js"></script> -->

</body>
</html>
